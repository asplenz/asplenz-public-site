<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1020 340" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <linearGradient id="srcGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#e0f2fe"/>
    </linearGradient>
    <linearGradient id="llmGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#faf5ff"/>
      <stop offset="100%" stop-color="#f3e8ff"/>
    </linearGradient>
    <linearGradient id="draftGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fffbeb"/>
      <stop offset="100%" stop-color="#fef3c7"/>
    </linearGradient>
    <linearGradient id="reviewGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff7ed"/>
      <stop offset="100%" stop-color="#ffedd5"/>
    </linearGradient>
    <linearGradient id="regGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="100%" stop-color="#dcfce7"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="10" markerHeight="7" orient="auto-start-auto">
      <path d="M 0 0 L 10 3.5 L 0 7 z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1020" height="340" rx="16" fill="#fafafa"/>

  <!-- ── SOURCES COLUMN ── -->
  <g filter="url(#shadow)">
    <rect x="30" y="40" width="150" height="260" rx="12" fill="url(#srcGrad)" stroke="#bae6fd" stroke-width="1.2"/>
  </g>
  <text x="105" y="68" text-anchor="middle" font-size="11" font-weight="700" fill="#0369a1" letter-spacing="0.05em">SOURCES</text>

  <!-- Source pills -->
  <rect x="46" y="84" width="118" height="30" rx="8" fill="#fff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="105" y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">Repos Git</text>

  <rect x="46" y="122" width="118" height="30" rx="8" fill="#fff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="105" y="142" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">Pull Requests</text>

  <rect x="46" y="160" width="118" height="30" rx="8" fill="#fff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="105" y="180" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">Notion</text>

  <rect x="46" y="198" width="118" height="30" rx="8" fill="#fff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="105" y="218" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">Excel</text>

  <rect x="46" y="236" width="118" height="30" rx="8" fill="#fff" stroke="#7dd3fc" stroke-width="1"/>
  <text x="105" y="256" text-anchor="middle" font-size="12" font-weight="600" fill="#0c4a6e">PDFs</text>

  <!-- Arrow 1: Sources → Distill -->
  <line x1="180" y1="170" x2="230" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── DISTILL LLM BOX ── -->
  <g filter="url(#shadow)">
    <rect x="234" y="100" width="160" height="140" rx="12" fill="url(#llmGrad)" stroke="#d8b4fe" stroke-width="1.2"/>
  </g>
  <text x="314" y="135" text-anchor="middle" font-size="14" font-weight="700" fill="#7c3aed">Distill</text>
  <text x="314" y="155" text-anchor="middle" font-size="11" fill="#6d28d9" font-weight="500">LLM Extraction</text>

  <line x1="264" y1="168" x2="364" y2="168" stroke="#d8b4fe" stroke-width="0.8"/>

  <text x="314" y="188" text-anchor="middle" font-size="10" fill="#5b21b6">Chunking</text>
  <text x="314" y="204" text-anchor="middle" font-size="10" fill="#5b21b6">Deduplication</text>
  <text x="314" y="220" text-anchor="middle" font-size="10" fill="#5b21b6">Tension detection</text>

  <!-- Arrow 2: Distill → Drafts -->
  <line x1="394" y1="170" x2="444" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── DRAFTS BOX ── -->
  <g filter="url(#shadow)">
    <rect x="448" y="62" width="186" height="216" rx="12" fill="url(#draftGrad)" stroke="#fcd34d" stroke-width="1.2"/>
  </g>
  <text x="541" y="90" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e" letter-spacing="0.05em">DRAFTS TYPÉS</text>

  <rect x="466" y="104" width="150" height="28" rx="7" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
  <circle cx="481" cy="118" r="5" fill="#dc2626"/>
  <text x="494" y="123" font-size="11" font-weight="600" fill="#78350f">Invariants candidats</text>

  <rect x="466" y="140" width="150" height="28" rx="7" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
  <circle cx="481" cy="154" r="5" fill="#2563eb"/>
  <text x="494" y="159" font-size="11" font-weight="600" fill="#78350f">Règles candidates</text>

  <rect x="466" y="176" width="150" height="28" rx="7" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
  <circle cx="481" cy="190" r="5" fill="#16a34a"/>
  <text x="494" y="195" font-size="11" font-weight="600" fill="#78350f">Décisions candidates</text>

  <rect x="466" y="212" width="150" height="28" rx="7" fill="#fff" stroke="#fbbf24" stroke-width="1"/>
  <circle cx="481" cy="226" r="5" fill="#9333ea"/>
  <text x="494" y="231" font-size="11" font-weight="600" fill="#78350f">Relations détectées</text>

  <!-- Confidence badge -->
  <rect x="478" y="250" width="108" height="18" rx="9" fill="#fef9c3" stroke="#eab308" stroke-width="0.8"/>
  <text x="532" y="263" text-anchor="middle" font-size="9" font-weight="600" fill="#854d0e">confidence 0.6 – 1.0</text>

  <!-- Arrow 3: Drafts → Validation -->
  <line x1="634" y1="170" x2="684" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── VALIDATION BOX ── -->
  <g filter="url(#shadow)">
    <rect x="688" y="108" width="130" height="124" rx="12" fill="url(#reviewGrad)" stroke="#fdba74" stroke-width="1.2"/>
  </g>
  <text x="753" y="138" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412" letter-spacing="0.05em">VALIDATION</text>
  <text x="753" y="155" text-anchor="middle" font-size="11" fill="#c2410c" font-weight="500">Humaine</text>

  <line x1="708" y1="164" x2="798" y2="164" stroke="#fdba74" stroke-width="0.8"/>

  <!-- Approve pill -->
  <rect x="706" y="174" width="94" height="22" rx="6" fill="#dcfce7" stroke="#86efac" stroke-width="1"/>
  <text x="753" y="189" text-anchor="middle" font-size="10" font-weight="700" fill="#166534">✓  Approve</text>

  <!-- Reject pill -->
  <rect x="706" y="202" width="94" height="22" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="753" y="217" text-anchor="middle" font-size="10" font-weight="700" fill="#991b1b">✕  Reject</text>

  <!-- Arrow 4: Validation → Registre -->
  <line x1="818" y1="170" x2="868" y2="170" stroke="#94a3b8" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- ── REGISTRE BOX ── -->
  <g filter="url(#shadow)">
    <rect x="872" y="100" width="120" height="140" rx="12" fill="url(#regGrad)" stroke="#86efac" stroke-width="1.2"/>
  </g>
  <text x="932" y="128" text-anchor="middle" font-size="11" font-weight="700" fill="#166534" letter-spacing="0.05em">REGISTRE</text>
  <text x="932" y="145" text-anchor="middle" font-size="10" fill="#15803d" font-weight="500">Knowledge</text>

  <line x1="892" y1="154" x2="972" y2="154" stroke="#86efac" stroke-width="0.8"/>

  <text x="932" y="174" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Invariants</text>
  <text x="932" y="194" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Rules</text>
  <text x="932" y="214" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Decisions</text>
  <text x="932" y="232" text-anchor="middle" font-size="11" font-weight="600" fill="#14532d">Links</text>

  <!-- Bottom label -->
  <text x="510" y="326" text-anchor="middle" font-size="10" fill="#94a3b8" font-weight="500" letter-spacing="0.08em">DISTILL PIPELINE — Nothing is published without human approval</text>
</svg>
