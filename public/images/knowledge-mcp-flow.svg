<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 520" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arr-back" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="10 0, 0 3.5, 10 7" fill="#22c55e"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.07"/>
    </filter>
    <linearGradient id="mcp-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#818cf8" stop-opacity="0.02"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1100" height="520" fill="#fafafa" rx="0"/>

  <!-- MCP channel highlight -->
  <rect x="370" y="30" width="160" height="460" rx="12" fill="url(#mcp-grad)" stroke="#c7d2fe" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="450" y="58" text-anchor="middle" font-size="11" font-weight="600" fill="#6366f1" letter-spacing="0.06em">MCP PROTOCOL</text>

  <!-- Knowledge box -->
  <rect x="600" y="30" width="460" height="460" rx="12" fill="white" filter="url(#sh)" stroke="#e5e7eb" stroke-width="1"/>
  <text x="830" y="62" text-anchor="middle" font-size="13" font-weight="700" fill="#111827" letter-spacing="0.03em">KNOWLEDGE REGISTRY</text>
  <line x1="620" y1="74" x2="1040" y2="74" stroke="#f3f4f6" stroke-width="1"/>

  <!-- Knowledge internal: resolve() -->
  <rect x="630" y="95" width="200" height="80" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5" filter="url(#sh)"/>
  <text x="730" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#22c55e">resolve()</text>
  <text x="730" y="138" text-anchor="middle" font-size="9" fill="#374151">Scope + Namespace</text>
  <text x="730" y="152" text-anchor="middle" font-size="9" fill="#374151">→ full normative state</text>
  <text x="730" y="166" text-anchor="middle" font-size="8" fill="#9ca3af">deterministic, cached</text>

  <!-- Knowledge internal: check() -->
  <rect x="860" y="95" width="180" height="80" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="1.5" filter="url(#sh)"/>
  <text x="950" y="120" text-anchor="middle" font-size="12" font-weight="600" fill="#3b82f6">check()</text>
  <text x="950" y="138" text-anchor="middle" font-size="9" fill="#374151">Intended action</text>
  <text x="950" y="152" text-anchor="middle" font-size="9" fill="#374151">→ allowed / conflicts</text>
  <text x="950" y="166" text-anchor="middle" font-size="8" fill="#9ca3af">quick compliance verdict</text>

  <!-- Knowledge internal: Normative State -->
  <rect x="630" y="200" width="410" height="140" rx="8" fill="#fafafa" stroke="#e5e7eb" stroke-width="1"/>
  <text x="835" y="222" text-anchor="middle" font-size="11" font-weight="600" fill="#6b7280">NORMATIVE STATE</text>

  <!-- 4 entity pills -->
  <rect x="650" y="238" width="85" height="28" rx="14" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="692" y="256" text-anchor="middle" font-size="9" font-weight="600" fill="#ef4444">Invariants</text>

  <rect x="748" y="238" width="65" height="28" rx="14" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="780" y="256" text-anchor="middle" font-size="9" font-weight="600" fill="#22c55e">Rules</text>

  <rect x="826" y="238" width="80" height="28" rx="14" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="866" y="256" text-anchor="middle" font-size="9" font-weight="600" fill="#3b82f6">Decisions</text>

  <rect x="919" y="238" width="80" height="28" rx="14" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="959" y="256" text-anchor="middle" font-size="9" font-weight="600" fill="#f59e0b">Overrides</text>

  <!-- Graph + Relations -->
  <text x="835" y="290" text-anchor="middle" font-size="9" fill="#9ca3af">Connected graph: DEPENDS_ON · OVERRIDES · REPLACES · IN_TENSION_WITH</text>

  <!-- Scopes -->
  <rect x="650" y="305" width="170" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="735" y="321" text-anchor="middle" font-size="9" fill="#6b7280">engineering/payments/pci</text>
  <rect x="835" y="305" width="170" height="24" rx="4" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="920" y="321" text-anchor="middle" font-size="9" fill="#6b7280">finance/credit/inv-grade</text>

  <!-- Knowledge internal: Response -->
  <rect x="630" y="370" width="410" height="100" rx="8" fill="white" stroke="#e5e7eb" stroke-width="1"/>
  <text x="835" y="392" text-anchor="middle" font-size="11" font-weight="600" fill="#374151">RESPONSE</text>
  <text x="660" y="415" font-size="9" fill="#6b7280">blocking_invariants:</text>
  <text x="790" y="415" font-size="9" fill="#ef4444" font-weight="500">[inv-2fb2af9533f4]</text>
  <text x="660" y="432" font-size="9" fill="#6b7280">mandatory_rules:</text>
  <text x="776" y="432" font-size="9" fill="#22c55e" font-weight="500">[rul-0135c5c224bb, rul-65f25838d0f8]</text>
  <text x="660" y="449" font-size="9" fill="#6b7280">active_overrides:</text>
  <text x="780" y="449" font-size="9" fill="#f59e0b" font-weight="500">[ovr-27b1c6b50923]</text>
  <text x="660" y="466" font-size="9" fill="#6b7280">normative_hash:</text>
  <text x="770" y="466" font-size="9" fill="#9ca3af" font-weight="500">sha256:71c7e8309eb3d731</text>

  <!-- ==================== AGENTS (left) ==================== -->

  <!-- Agent 1: Engineering -->
  <rect x="40" y="80" width="280" height="85" rx="10" fill="white" filter="url(#sh)" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="40" y="80" width="6" height="85" rx="3" fill="#6366f1"/>
  <text x="65" y="104" font-size="11" font-weight="700" fill="#111827">Engineering Agent</text>
  <text x="65" y="119" font-size="9" fill="#6b7280">Claude Code / Cursor / Copilot</text>
  <text x="65" y="140" font-size="9" fill="#374151">resolve("engineering/payments")</text>
  <text x="65" y="155" font-size="8" fill="#9ca3af">Before writing any code</text>

  <!-- Agent 2: Compliance -->
  <rect x="40" y="205" width="280" height="85" rx="10" fill="white" filter="url(#sh)" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="40" y="205" width="6" height="85" rx="3" fill="#f59e0b"/>
  <text x="65" y="229" font-size="11" font-weight="700" fill="#111827">Compliance Agent</text>
  <text x="65" y="244" font-size="9" fill="#6b7280">Loan processing / KYC / AML</text>
  <text x="65" y="265" font-size="9" fill="#374151">check("finance/credit", action)</text>
  <text x="65" y="280" font-size="8" fill="#9ca3af">Before processing any case</text>

  <!-- Agent 3: CI/Verifier -->
  <rect x="40" y="330" width="280" height="85" rx="10" fill="white" filter="url(#sh)" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="40" y="330" width="6" height="85" rx="3" fill="#ef4444"/>
  <text x="65" y="354" font-size="11" font-weight="700" fill="#111827">CI Pipeline / Verifier</text>
  <text x="65" y="369" font-size="9" fill="#6b7280">GitHub Actions / GitLab CI</text>
  <text x="65" y="390" font-size="9" fill="#374151">resolve() + verify citations</text>
  <text x="65" y="405" font-size="8" fill="#9ca3af">Before merging any PR</text>

  <!-- ==================== ARROWS ==================== -->

  <!-- Agent 1 → MCP -->
  <line x1="320" y1="122" x2="370" y2="122" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- MCP → Knowledge -->
  <line x1="530" y1="122" x2="625" y2="135" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Agent 2 → MCP -->
  <line x1="320" y1="247" x2="370" y2="247" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- MCP → Knowledge -->
  <line x1="530" y1="247" x2="625" y2="200" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Agent 3 → MCP -->
  <line x1="320" y1="372" x2="370" y2="372" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- MCP → Knowledge -->
  <line x1="530" y1="372" x2="625" y2="300" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Return arrows (green, dashed) -->
  <line x1="625" y1="420" x2="530" y2="390" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-start="url(#arr-back)"/>
  <line x1="625" y1="400" x2="530" y2="260" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-start="url(#arr-back)"/>
  <line x1="625" y1="380" x2="530" y2="135" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-start="url(#arr-back)"/>

  <line x1="370" y1="135" x2="320" y2="135" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-start="url(#arr-back)"/>
  <line x1="370" y1="260" x2="320" y2="260" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-start="url(#arr-back)"/>
  <line x1="370" y1="390" x2="320" y2="390" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-start="url(#arr-back)"/>

  <!-- MCP channel tools list -->
  <text x="450" y="100" text-anchor="middle" font-size="8" fill="#6366f1">resolve()</text>
  <text x="450" y="115" text-anchor="middle" font-size="8" fill="#6366f1">check()</text>
  <text x="450" y="130" text-anchor="middle" font-size="8" fill="#6366f1">query()</text>
  <text x="450" y="200" text-anchor="middle" font-size="8" fill="#6366f1">record()</text>
  <text x="450" y="215" text-anchor="middle" font-size="8" fill="#6366f1">override()</text>
  <text x="450" y="230" text-anchor="middle" font-size="8" fill="#6366f1">approval()</text>

  <text x="450" y="310" text-anchor="middle" font-size="8" fill="#6366f1">reference()</text>
  <text x="450" y="325" text-anchor="middle" font-size="8" fill="#6366f1">list_rules()</text>
  <text x="450" y="340" text-anchor="middle" font-size="8" fill="#6366f1">list_invariants()</text>
  <text x="450" y="355" text-anchor="middle" font-size="8" fill="#6366f1">approval_status()</text>

  <!-- Bottom tagline -->
  <text x="550" y="508" text-anchor="middle" font-size="11" fill="#9ca3af" font-style="italic">Same protocol. Same registry. Any agent. Any domain.</text>
</svg>
