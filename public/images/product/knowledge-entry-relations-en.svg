<svg viewBox="0 0 800 320" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
    </marker>
  </defs>

  <rect x="200" y="20" width="400" height="56" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="400" y="42" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="600" letter-spacing="0.05em">DECISION</text>
  <text x="400" y="60" text-anchor="middle" font-size="13" fill="#1e1b4b">"Use PostgreSQL for transactional data"</text>

  <rect x="20" y="180" width="320" height="56" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="180" y="202" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600" letter-spacing="0.05em">INVARIANT</text>
  <text x="180" y="220" text-anchor="middle" font-size="12" fill="#450a0a">"No eventual consistency for financial tx"</text>

  <rect x="380" y="180" width="320" height="56" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="540" y="202" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600" letter-spacing="0.05em">RULE</text>
  <text x="540" y="220" text-anchor="middle" font-size="12" fill="#052e16">"New services must use PostgreSQL"</text>

  <rect x="240" y="270" width="320" height="44" rx="10" fill="#f5f5f5" stroke="#a3a3a3" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="400" y="290" text-anchor="middle" font-size="11" fill="#737373" font-weight="600" letter-spacing="0.05em">DECISION (superseded)</text>
  <text x="400" y="305" text-anchor="middle" font-size="11" fill="#a3a3a3">"Evaluate NoSQL for payments"</text>

  <path d="M320,76 L200,180" stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="190" y="118" width="70" height="20" rx="4" fill="white"/>
  <text x="225" y="132" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="500">creates</text>

  <path d="M480,76 L520,180" stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <rect x="470" y="118" width="70" height="20" rx="4" fill="white"/>
  <text x="505" y="132" text-anchor="middle" font-size="11" fill="#6366f1" font-weight="500">creates</text>

  <path d="M400,76 L400,270" stroke="#a3a3a3" stroke-width="1.5" fill="none" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <rect x="355" y="165" width="90" height="20" rx="4" fill="white"/>
  <text x="400" y="179" text-anchor="middle" font-size="11" fill="#a3a3a3" font-weight="500">supersedes</text>
</svg>
