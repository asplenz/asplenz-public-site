<svg viewBox="0 0 640 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="pf-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
    </marker>
    <marker id="pf-arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
    </marker>
    <marker id="pf-arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
    <marker id="pf-arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <text x="320" y="24" text-anchor="middle" font-size="13" fill="#22c55e" font-weight="700" letter-spacing="0.03em">AVEC KNOWLEDGE</text>

  <rect x="170" y="44" width="300" height="44" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="320" y="71" text-anchor="middle" font-size="13" fill="#1e293b">L'agent reçoit une tâche</text>

  <line x1="320" y1="88" x2="320" y2="120" stroke="#6366f1" stroke-width="1.5" marker-end="url(#pf-arrow)"/>

  <rect x="150" y="120" width="340" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="320" y="143" text-anchor="middle" font-size="12" fill="#4338ca" font-weight="600">Interroger Knowledge</text>
  <text x="320" y="161" text-anchor="middle" font-size="11" fill="#1e1b4b">« Quelles contraintes s'appliquent à ce scope ? »</text>

  <line x1="210" y1="172" x2="90" y2="220" stroke="#ef4444" stroke-width="1.5" marker-end="url(#pf-arrow-red)"/>
  <rect x="16" y="220" width="150" height="52" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="91" y="242" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">BLOQUÉ</text>
  <text x="91" y="260" text-anchor="middle" font-size="10" fill="#450a0a">Stop, signaler le conflit</text>

  <line x1="320" y1="172" x2="320" y2="220" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#pf-arrow-amber)"/>
  <rect x="245" y="220" width="150" height="52" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="320" y="242" text-anchor="middle" font-size="11" fill="#d97706" font-weight="600">APPROBATION</text>
  <text x="320" y="260" text-anchor="middle" font-size="10" fill="#451a03">Demander et attendre</text>

  <line x1="430" y1="172" x2="540" y2="220" stroke="#22c55e" stroke-width="1.5" marker-end="url(#pf-arrow-green)"/>
  <rect x="470" y="220" width="150" height="52" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="545" y="242" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">AUTORISÉ</text>
  <text x="545" y="260" text-anchor="middle" font-size="10" fill="#052e16">Procéder avec le contexte</text>

  <line x1="320" y1="272" x2="320" y2="310" stroke="#22c55e" stroke-width="1.5" marker-end="url(#pf-arrow-green)"/>
  <line x1="545" y1="272" x2="320" y2="310" stroke="#22c55e" stroke-width="1" stroke-dasharray="5,3"/>

  <rect x="170" y="310" width="300" height="52" rx="10" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="320" y="333" text-anchor="middle" font-size="12" fill="#16a34a" font-weight="600">L'agent agit avec vos règles</text>
  <text x="320" y="351" text-anchor="middle" font-size="11" fill="#052e16">informé, conforme, traçable</text>

  <line x1="320" y1="362" x2="320" y2="400" stroke="#6366f1" stroke-width="1.5" marker-end="url(#pf-arrow)"/>

  <rect x="170" y="400" width="300" height="52" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="320" y="423" text-anchor="middle" font-size="12" fill="#4338ca" font-weight="600">Enregistrer la référence</text>
  <text x="320" y="441" text-anchor="middle" font-size="11" fill="#1e1b4b">« J'ai suivi la contrainte X dans la PR #42 »</text>
</svg>
