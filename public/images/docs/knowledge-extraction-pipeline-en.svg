<svg viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="ep-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
    </marker>
    <marker id="ep-arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#22c55e"/>
    </marker>
    <marker id="ep-arrow-red" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#ef4444"/>
    </marker>
    <marker id="ep-arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <rect x="190" y="16" width="300" height="48" rx="10" fill="#f8fafc" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="340" y="36" text-anchor="middle" font-size="10" fill="#64748b" font-weight="600" letter-spacing="0.05em">SOURCES</text>
  <text x="340" y="52" text-anchor="middle" font-size="12" fill="#1e293b">docs, repos, Slack, files...</text>

  <line x1="340" y1="64" x2="340" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ep-arrow)"/>

  <rect x="190" y="100" width="300" height="48" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="340" y="120" text-anchor="middle" font-size="10" fill="#6366f1" font-weight="600" letter-spacing="0.05em">EXTRACTION</text>
  <text x="340" y="136" text-anchor="middle" font-size="12" fill="#1e1b4b">reads and splits into chunks</text>

  <line x1="340" y1="148" x2="340" y2="184" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ep-arrow)"/>

  <rect x="190" y="184" width="300" height="48" rx="10" fill="#faf5ff" stroke="#a855f7" stroke-width="1.5"/>
  <text x="340" y="204" text-anchor="middle" font-size="10" fill="#a855f7" font-weight="600" letter-spacing="0.05em">ANALYSIS</text>
  <text x="340" y="220" text-anchor="middle" font-size="12" fill="#3b0764">identifies typed candidates</text>

  <line x1="340" y1="232" x2="340" y2="268" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ep-arrow)"/>

  <rect x="190" y="268" width="300" height="48" rx="10" fill="#fff7ed" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="288" text-anchor="middle" font-size="10" fill="#d97706" font-weight="600" letter-spacing="0.05em">DEDUPLICATION</text>
  <text x="340" y="304" text-anchor="middle" font-size="12" fill="#451a03">filters duplicates, flags similar entries</text>

  <line x1="340" y1="316" x2="340" y2="352" stroke="#6366f1" stroke-width="1.5" marker-end="url(#ep-arrow)"/>

  <rect x="190" y="352" width="300" height="48" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="340" y="372" text-anchor="middle" font-size="10" fill="#ef4444" font-weight="600" letter-spacing="0.05em">DRAFTS (PENDING)</text>
  <text x="340" y="388" text-anchor="middle" font-size="12" fill="#450a0a">human review in dashboard</text>

  <line x1="240" y1="400" x2="120" y2="460" stroke="#22c55e" stroke-width="1.5" marker-end="url(#ep-arrow-green)"/>
  <rect x="40" y="460" width="160" height="40" rx="8" fill="#f0fdf4" stroke="#22c55e" stroke-width="1.5"/>
  <text x="120" y="476" text-anchor="middle" font-size="11" fill="#16a34a" font-weight="600">APPROVE</text>
  <text x="120" y="492" text-anchor="middle" font-size="11" fill="#052e16">published to registry</text>

  <line x1="340" y1="400" x2="340" y2="460" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#ep-arrow-amber)"/>
  <rect x="260" y="460" width="160" height="40" rx="8" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="340" y="476" text-anchor="middle" font-size="11" fill="#d97706" font-weight="600">EDIT</text>
  <text x="340" y="492" text-anchor="middle" font-size="11" fill="#451a03">modify then approve</text>

  <line x1="440" y1="400" x2="560" y2="460" stroke="#ef4444" stroke-width="1.5" marker-end="url(#ep-arrow-red)"/>
  <rect x="480" y="460" width="160" height="40" rx="8" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="560" y="476" text-anchor="middle" font-size="11" fill="#ef4444" font-weight="600">REJECT</text>
  <text x="560" y="492" text-anchor="middle" font-size="11" fill="#450a0a">discarded</text>
</svg>
