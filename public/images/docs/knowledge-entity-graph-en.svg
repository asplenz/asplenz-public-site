<svg viewBox="0 0 780 480" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, sans-serif">
  <defs>
    <marker id="eg-arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#6366f1"/>
    </marker>
    <marker id="eg-arrow-amber" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#f59e0b"/>
    </marker>
  </defs>

  <!-- Decision box -->
  <rect x="20" y="80" width="240" height="72" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="40" y="102" font-size="10" fill="#6366f1" font-weight="600" letter-spacing="0.05em">DECISION</text>
  <text x="40" y="122" font-size="12" fill="#1e1b4b">"We chose PostgreSQL for</text>
  <text x="40" y="138" font-size="12" fill="#1e1b4b">all transactional data stores"</text>

  <!-- Arrow: Decision → Invariant -->
  <line x1="260" y1="100" x2="380" y2="100" stroke="#6366f1" stroke-width="1.5" marker-end="url(#eg-arrow)"/>
  <text x="320" y="92" text-anchor="middle" font-size="10" fill="#6366f1" font-weight="500">creates</text>

  <!-- Arrow: Decision → Rule -->
  <path d="M260,130 Q320,130 320,280 Q320,330 380,330" stroke="#6366f1" stroke-width="1.5" fill="none" marker-end="url(#eg-arrow)"/>
  <text x="300" y="240" font-size="10" fill="#6366f1" font-weight="500">creates</text>

  <!-- Invariant box -->
  <rect x="380" y="68" width="320" height="72" rx="10" fill="#fef2f2" stroke="#ef4444" stroke-width="1.5"/>
  <text x="400" y="90" font-size="10" fill="#ef4444" font-weight="600" letter-spacing="0.05em">INVARIANT</text>
  <text x="400" y="110" font-size="12" fill="#7f1d1d">"All transactional data must</text>
  <text x="400" y="126" font-size="12" fill="#7f1d1d">use PostgreSQL"</text>

  <!-- Arrow: Invariant → Override on invariant -->
  <line x1="540" y1="140" x2="540" y2="180" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#eg-arrow-amber)"/>
  <text x="555" y="165" font-size="10" fill="#f59e0b" font-weight="500">exception</text>

  <!-- Override on invariant -->
  <rect x="400" y="184" width="300" height="72" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="206" font-size="10" fill="#f59e0b" font-weight="600" letter-spacing="0.05em">OVERRIDE (temporary)</text>
  <text x="420" y="226" font-size="12" fill="#78350f">"Legacy billing uses MySQL</text>
  <text x="420" y="242" font-size="12" fill="#78350f">until Q3 migration"</text>

  <!-- Rule box -->
  <rect x="380" y="300" width="320" height="72" rx="10" fill="#ecfdf5" stroke="#22c55e" stroke-width="1.5"/>
  <text x="400" y="322" font-size="10" fill="#22c55e" font-weight="600" letter-spacing="0.05em">RULE (MANDATORY)</text>
  <text x="400" y="342" font-size="12" fill="#14532d">"All new services must include</text>
  <text x="400" y="358" font-size="12" fill="#14532d">a database migration script"</text>

  <!-- Arrow: Rule → Override on rule -->
  <line x1="540" y1="372" x2="540" y2="408" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#eg-arrow-amber)"/>
  <text x="555" y="395" font-size="10" fill="#f59e0b" font-weight="500">exception</text>

  <!-- Override on rule -->
  <rect x="400" y="412" width="300" height="52" rx="10" fill="#fffbeb" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="420" y="432" font-size="10" fill="#f59e0b" font-weight="600" letter-spacing="0.05em">OVERRIDE (permanent)</text>
  <text x="420" y="450" font-size="12" fill="#78350f">"Shared libs skip migration (no DB)"</text>

  <!-- Legend -->
  <text x="20" y="30" font-size="11" fill="#64748b">Decisions capture </text>
  <text x="130" y="30" font-size="11" fill="#6366f1" font-weight="600" font-style="italic">why</text>
  <text x="152" y="30" font-size="11" fill="#64748b">. Invariants and rules capture </text>
  <text x="362" y="30" font-size="11" fill="#ef4444" font-weight="600" font-style="italic">what</text>
  <text x="390" y="30" font-size="11" fill="#64748b">. Overrides capture </text>
  <text x="523" y="30" font-size="11" fill="#f59e0b" font-weight="600" font-style="italic">where you deviated</text>
  <text x="645" y="30" font-size="11" fill="#64748b">.</text>
</svg>
