<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 400" font-family="Inter, system-ui, -apple-system, sans-serif">
  <defs>
    <marker id="arr" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6366f1"/>
    </marker>
    <marker id="arr-back" viewBox="0 0 10 7" refX="0" refY="3.5" markerWidth="9" markerHeight="7" orient="auto-start-reverse">
      <polygon points="10 0, 0 3.5, 10 7" fill="#22c55e"/>
    </marker>
    <filter id="sh" x="-3%" y="-3%" width="106%" height="106%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-opacity="0.07"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="900" height="400" fill="#fafafa" rx="0"/>

  <!-- ==================== AGENTS (left) ==================== -->

  <!-- Agent 1: Engineering -->
  <rect x="40" y="60" width="220" height="60" rx="10" fill="white" filter="url(#sh)" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="40" y="60" width="5" height="60" rx="2.5" fill="#6366f1"/>
  <text x="62" y="86" font-size="12" font-weight="700" fill="#111827">Engineering Agent</text>
  <text x="62" y="104" font-size="9" fill="#6b7280">Claude Code / Cursor / Copilot</text>

  <!-- Agent 2: Compliance -->
  <rect x="40" y="160" width="220" height="60" rx="10" fill="white" filter="url(#sh)" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="40" y="160" width="5" height="60" rx="2.5" fill="#f59e0b"/>
  <text x="62" y="186" font-size="12" font-weight="700" fill="#111827">Compliance Agent</text>
  <text x="62" y="204" font-size="9" fill="#6b7280">Loan processing / KYC / AML</text>

  <!-- Agent 3: Pricing -->
  <rect x="40" y="260" width="220" height="60" rx="10" fill="white" filter="url(#sh)" stroke="#e5e7eb" stroke-width="1"/>
  <rect x="40" y="260" width="5" height="60" rx="2.5" fill="#ef4444"/>
  <text x="62" y="286" font-size="12" font-weight="700" fill="#111827">Pricing Agent</text>
  <text x="62" y="304" font-size="9" fill="#6b7280">Dynamic pricing / margin rules</text>

  <!-- ==================== MCP (center) ==================== -->

  <rect x="350" y="120" width="120" height="140" rx="12" fill="white" filter="url(#sh)" stroke="#c7d2fe" stroke-width="1.5"/>
  <text x="410" y="175" text-anchor="middle" font-size="11" font-weight="700" fill="#6366f1" letter-spacing="0.06em">MCP</text>
  <text x="410" y="195" text-anchor="middle" font-size="9" fill="#9ca3af">PROTOCOL</text>
  <text x="410" y="218" text-anchor="middle" font-size="8" fill="#6366f1">resolve()</text>
  <text x="410" y="232" text-anchor="middle" font-size="8" fill="#6366f1">check()</text>
  <text x="410" y="246" text-anchor="middle" font-size="8" fill="#6366f1">query()</text>

  <!-- ==================== KNOWLEDGE (right) ==================== -->

  <rect x="560" y="40" width="300" height="300" rx="12" fill="white" filter="url(#sh)" stroke="#e5e7eb" stroke-width="1"/>
  <text x="710" y="72" text-anchor="middle" font-size="13" font-weight="700" fill="#111827" letter-spacing="0.03em">KNOWLEDGE</text>
  <line x1="580" y1="84" x2="840" y2="84" stroke="#f3f4f6" stroke-width="1"/>

  <!-- 4 entity pills -->
  <rect x="585" y="105" width="90" height="30" rx="15" fill="#fef2f2" stroke="#ef4444" stroke-width="1"/>
  <text x="630" y="124" text-anchor="middle" font-size="10" font-weight="600" fill="#ef4444">Invariants</text>

  <rect x="688" y="105" width="70" height="30" rx="15" fill="#f0fdf4" stroke="#22c55e" stroke-width="1"/>
  <text x="723" y="124" text-anchor="middle" font-size="10" font-weight="600" fill="#22c55e">Rules</text>

  <rect x="585" y="150" width="85" height="30" rx="15" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="627" y="169" text-anchor="middle" font-size="10" font-weight="600" fill="#3b82f6">Decisions</text>

  <rect x="683" y="150" width="85" height="30" rx="15" fill="#fffbeb" stroke="#f59e0b" stroke-width="1"/>
  <text x="725" y="169" text-anchor="middle" font-size="10" font-weight="600" fill="#f59e0b">Overrides</text>

  <!-- Scopes -->
  <text x="710" y="215" text-anchor="middle" font-size="10" font-weight="600" fill="#6b7280">SCOPES</text>

  <rect x="585" y="230" width="140" height="28" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="655" y="249" text-anchor="middle" font-size="9" fill="#374151">engineering/payments</text>

  <rect x="738" y="230" width="115" height="28" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="795" y="249" text-anchor="middle" font-size="9" fill="#374151">finance/credit</text>

  <!-- Response area -->
  <rect x="585" y="278" width="268" height="48" rx="6" fill="#f9fafb" stroke="#e5e7eb" stroke-width="1"/>
  <text x="710" y="298" text-anchor="middle" font-size="9" font-weight="600" fill="#374151">Response: rules + invariants + overrides</text>
  <text x="710" y="314" text-anchor="middle" font-size="8" fill="#9ca3af">deterministic normative state</text>

  <!-- ==================== ARROWS ==================== -->

  <!-- Request arrows: Agents → MCP -->
  <line x1="260" y1="90" x2="348" y2="170" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="260" y1="190" x2="348" y2="190" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="260" y1="290" x2="348" y2="210" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Request arrows: MCP → Knowledge -->
  <line x1="470" y1="175" x2="555" y2="175" stroke="#6366f1" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Return arrows: Knowledge → MCP -->
  <line x1="555" y1="205" x2="470" y2="205" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arr-back)"/>

  <!-- Return arrows: MCP → Agents -->
  <line x1="348" y1="180" x2="260" y2="100" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arr-back)"/>
  <line x1="348" y1="200" x2="260" y2="200" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arr-back)"/>
  <line x1="348" y1="220" x2="260" y2="300" stroke="#22c55e" stroke-width="1.2" stroke-dasharray="4 2" marker-end="url(#arr-back)"/>

  <!-- Arrow labels -->
  <text x="305" y="128" text-anchor="middle" font-size="8" fill="#6366f1">request</text>
  <text x="510" y="168" text-anchor="middle" font-size="8" fill="#6366f1">request</text>
  <text x="510" y="222" text-anchor="middle" font-size="8" fill="#22c55e">verdict</text>
  <text x="305" y="242" text-anchor="middle" font-size="8" fill="#22c55e">verdict</text>

  <!-- Bottom tagline -->
  <text x="450" y="380" text-anchor="middle" font-size="11" fill="#9ca3af" font-style="italic">Same protocol. Same registry. Any agent. Any domain.</text>
</svg>